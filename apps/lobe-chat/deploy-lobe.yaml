apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose -f compose.yaml convert
    kompose.version: 1.34.0 (HEAD)
  labels:
    io.kompose.service: lobe
  name: lobe
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: lobe
  template:
    metadata:
      annotations:
        kompose.cmd: kompose -f compose.yaml convert
        kompose.version: 1.34.0 (HEAD)
      labels:
        io.kompose.service: lobe
    spec:
      containers:
        - env:
            - name: APP_URL
              value: https://lobe.west-beta.ts.net
            - name: AUTH_CASDOOR_ID
              valueFrom:
                secretKeyRef:
                  name: lobe-auth
                  key: AUTH_CASDOOR_ID
            - name: AUTH_CASDOOR_ISSUER
              value: https://casdoor.west-beta.ts.net
            - name: AUTH_CASDOOR_SECRET
              valueFrom:
                secretKeyRef:
                  name: lobe-auth
                  key: AUTH_CASDOOR_SECRET
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: lobe-db-secrets
                  key: LOBE_DATABASE_URL
            - name: KEY_VAULTS_SECRET
              valueFrom:
                secretKeyRef:
                  name: lobe-auth
                  key: KEY_VAULTS_SECRET
            - name: LLM_VISION_IMAGE_USE_BASE64
              value: "1"
            - name: AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: lobe-auth
                  key: AUTH_SECRET
            - name: AUTH_SSO_PROVIDERS
              value: casdoor
