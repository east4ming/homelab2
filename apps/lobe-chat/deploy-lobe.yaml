              value: 374a892701
            - name: S3_BUCKET
              value: lobe
            - name: S3_ENABLE_PATH_STYLE
              value: "1"
            - name: S3_ENDPOINT
              value: https://rustfs.west-beta.ts.net
            - name: S3_PUBLIC_DOMAIN
              value: https://rustfs.west-beta.ts.net
            - name: S3_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: lobe-s3-secrets
                  key: S3_ACCESS_KEY_ID
            - name: S3_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: lobe-s3-secrets
                  key: S3_SECRET_ACCESS_KEY
            - name: DEEPSEEK_API_KEY
              valueFrom:
                secretKeyRef:
                  name: lobe-ai-api-keys
                  key: DEEPSEEK_API_KEY
            - name: ENABLED_OPENAI
              value: "0"
            - name: OLLAMA_PROXY_URL
              value: http://ollama.ollama:11434
            - name: ZHIPU_API_KEY
              valueFrom:
                secretKeyRef:
                  name: lobe-ai-api-keys
                  key: ZHIPU_API_KEY
            # 默认只支持embedding_length=1024的embeddings模型
            - name: DEFAULT_FILES_CONFIG
              value: embedding_model=ollama/qwen3-embedding:0.6b
            - name: SEARCH_PROVIDERS
              value: searxng
            - name: SEARXNG_URL
              value: http://searxng.searxng:8080
            - name: REDIS_URL
              value: redis://redis:6379
            - name: REDIS_PREFIX
              value: lobechat
            - name: REDIS_TLS
              value: "0"
          image: docker.io/lobehub/lobehub:latest
          imagePullPolicy: Always
          name: lobe-chat
          ports:
            - containerPort: 3210
              name: 3210tcp
              protocol: TCP
          resources:
            requests:
              cpu: 10m
              memory: 768Mi
            limits:
              memory: 1Gi
          livenessProbe:
            tcpSocket:
              port: 3210
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /
              port: 3210
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /
              port: 3210
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
      restartPolicy: Always
