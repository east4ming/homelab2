# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/app-template-5.0.0/charts/other/app-template/values.schema.json
app-template:
  defaultPodOptions:
    enableServiceLinks: false
  controllers:
    main:
      containers:
        main:
          image:
            repository: femtopixel/kompose
            tag: latest
            pullPolicy: Always
          command:
            - tail
            - "-f"
            - /dev/null
