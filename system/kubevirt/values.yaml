# KubeVirt + CDI Helm values
# k3s cluster with Intel N100 nodes (hardware virtualization available)

kubevirt:
  # KubeVirt version (embedded in manifest)
  version: v1.8.4
  # 默认 false — N100 节点支持硬件虚拟化 (/dev/kvm)
  useEmulation: false
  # 控制面组件资源 (virt-api, virt-controller)
  infraResources:
    requests:
      cpu: 50m
      memory: 200Mi
    limits:
      cpu: 200m
      memory: 400Mi
  # 工作负载组件资源 (virt-handler DaemonSet)
  workloadResources:
    requests:
      cpu: 100m
      memory: 300Mi
    limits:
      cpu: 500m
      memory: 1Gi

cdi:
  # CDI version (embedded in manifest)
  version: v1.65.0
  # CDI scratch space storage class (used during image import)
  scratchStorageClass: standard-rwo

# VM 默认配置
vm:
  # 操作系统镜像
  image: https://cloud-images.ubuntu.com/noble/current/noble-server-cloudimg-amd64.img
  # vCPU 数量
  cpu: 2
  # 内存
  memory: 4Gi
  # 根磁盘大小
  rootDiskSize: 10Gi
  # 数据磁盘大小
  dataDiskSize: 10Gi
  # StorageClass
  storageClass: standard-rwo
  # SSH 公钥 — 可选，为空则不注入密钥（此时只能通过 virtctl console 登录）
  sshPublicKey: ""
  # 使用已存在的 cloud-init Secret（优先级高于 sshPublicKey）
  # 例如通过 ExternalSecret 或手动创建的 Secret
  # Secret 中至少包含 userdata key（cloud-config 格式）
  cloudInitSecretName: ""
