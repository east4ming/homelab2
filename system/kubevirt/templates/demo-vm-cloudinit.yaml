# cloud-init Secret: VM 初始化配置
# 仅在未指定外部 Secret 时创建（vm.cloudInitSecretName 为空）
{{- if not .Values.vm.cloudInitSecretName }}
---
apiVersion: v1
kind: Secret
metadata:
  name: demo-vm-cloudinit
  namespace: kubevirt
type: Opaque
stringData:
  userdata: |
    #cloud-config
    hostname: demo-vm
    users:
      - name: ubuntu
        sudo: ALL=(ALL) NOPASSWD:ALL
        lock_passwd: true
        {{- if .Values.vm.sshPublicKey }}
        ssh_authorized_keys:
          - {{ .Values.vm.sshPublicKey }}
        {{- end }}
    package_update: true
    packages:
      - qemu-guest-agent
    runcmd:
      - systemctl enable --now qemu-guest-agent
{{- end }}
