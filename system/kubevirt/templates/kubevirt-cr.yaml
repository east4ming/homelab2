# KubeVirt Custom Resource — 触发 Operator 部署 KubeVirt 组件
# 参数化: useEmulation 开关、节点调度策略
---
apiVersion: kubevirt.io/v1
kind: KubeVirt
metadata:
  name: kubevirt
  namespace: kubevirt
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  certificateRotateStrategy: {}
  configuration:
    developerConfiguration:
      featureGates: []
      {{- if .Values.kubevirt.useEmulation }}
      useEmulation: true
      {{- end }}
    imagePullPolicy: IfNotPresent
  customizeComponents:
    patches:
      - resourceType: Deployment
        resourceName: virt-api
        type: json
        patch: '[{"op":"replace","path":"/spec/replicas","value":{{ .Values.kubevirt.replicas }}}]'
      - resourceType: Deployment
        resourceName: virt-controller
        type: json
        patch: '[{"op":"replace","path":"/spec/replicas","value":{{ .Values.kubevirt.replicas }}}]'
  imagePullPolicy: IfNotPresent
  workloadUpdateStrategy: {}
